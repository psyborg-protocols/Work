<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work Dynamics</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Minimalist Controls Container */
        #controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            box-sizing: border-box;
            z-index: 100;
            font-size: 14px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Native Inputs styled simply */
        button {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #000;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: background 0.1s;
        }
        button:hover {
            background: #eee;
        }
        button:active {
            background: #000;
            color: #fff;
        }

        input[type="range"] {
            width: 100px;
        }

        /* Stats Display */
        #stats {
            margin-left: auto;
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.2;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <!-- Standard HTML Controls -->
    <div id="controls">
        <!-- Worker 1 -->
        <div class="control-group">
            <div class="control-row">
                <input type="checkbox" id="toggle-t1" checked>
                <label for="toggle-t1" style="color: #0000cc;">
                    ■ The Orderly
                </label>
            </div>
            <div style="font-size: 11px; color: #666;" id="status-t1">Waiting...</div>
        </div>

        <!-- Worker 2 -->
        <div class="control-group">
            <div class="control-row">
                <input type="checkbox" id="toggle-t2" checked>
                <label for="toggle-t2" style="color: #cc4400;">
                    ■ The Renewal
                </label>
            </div>
            <div style="font-size: 11px; color: #666;" id="status-t2">Waiting...</div>
        </div>

        <!-- Cost Slider -->
        <div class="control-group">
            <label for="cost-slider">Energy Cost: <span id="cost-val">1.0x</span></label>
            <input type="range" id="cost-slider" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>

        <!-- Actions -->
        <div class="control-group" style="flex-direction: row;">
            <button id="btn-chaos">+ Mess</button>
            <button id="btn-reset">Reset</button>
        </div>

        <!-- Stats -->
        <div id="stats">
            <div id="time-display">00:00</div>
            <div id="mess-display">Mess: 0%</div>
        </div>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        // --- Configuration ---
        const CONFIG = {
            ticksPerDay: 720, // High resolution for smoothness (30 ticks/hour)
            
            // Type 1 (Orderly)
            t1StartHour: 8,
            t1EndHour: 10,
            t1BaseWorkRate: 0.4,    // Slower, smoother work
            t1PanicMultiplier: 1.2,
            t1EnergyCost: 0.25,
            t1BaseRecharge: 0.04,
            
            // Type 2 (Renewal)
            t2TriggerCrisis: 80,
            t2TriggerInspired: 98,
            t2StopThreshold: 5,
            t2BaseWorkRate: 1.8,    // Smoother burst
            t2EnergyCost: 0.5,
            t2BaseRecharge: 0.02,
        };

        let state = {
            ticks: 0,
            mess: 10,
            energyCostMultiplier: 1.0,
            
            t1Active: true,
            t1Energy: 80,
            t1IsWorking: false,
            t1Burnout: false, 

            t2Active: true,
            t2Energy: 50,
            t2IsWorking: false,
            t2Mode: 'dormant', 

            history: [],
            maxHistory: 3000 // More history points for smoother curves
        };

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // --- SMOOTH Mess Logic (Gaussian Curves) ---
        function getNaturalMessRate(hourFloat, isWeekend) {
            // 1. Base constant accumulation (Dust)
            let rate = 0.015; 

            // 2. Morning Spike (Gaussian curve centered at 8.0)
            // Height 0.3, Width 1.5
            rate += 0.3 * Math.exp(-Math.pow(hourFloat - 8, 2) / 2);

            // 3. Evening Spike (Gaussian curve centered at 19.0 / 7pm)
            // Height 0.45, Width 2.5 (Dinner is longer)
            rate += 0.45 * Math.exp(-Math.pow(hourFloat - 19, 2) / 4);

            // 4. Weekend Multiplier
            if (isWeekend) rate *= 1.4;

            // 5. Clutter Gravity (Smooth multiplier)
            if (state.mess > 50) {
                // Smoothly scale up from 1.0x at 50 mess to 1.3x at 100 mess
                const gravity = 1 + ((state.mess - 50) / 160);
                rate *= gravity;
            }

            return Math.max(0, rate); // Never negative mess
        }

        function getRechargeMultiplier(messLevel) {
            // Smooth linear interpolation from 1.5x (clean) to 0.2x (filthy)
            let m = 1.5 - (messLevel / 80);
            return Math.max(0.2, m);
        }

        function simulationStep() {
            state.ticks++;
            const ticksPerHour = CONFIG.ticksPerDay / 24;
            const totalHours = state.ticks / ticksPerHour;
            const hourFloat = totalHours % 24;
            const hourInt = Math.floor(hourFloat);
            const minute = Math.floor((hourFloat - hourInt) * 60);
            const dayIndex = Math.floor(totalHours / 24) + 1;
            const isWeekend = (dayIndex % 7 === 6 || dayIndex % 7 === 0);

            // --- 1. Environment ---
            // Pass float hour for smooth curve calculation
            const incomingMess = getNaturalMessRate(hourFloat, isWeekend);
            state.mess += incomingMess;

            // Safety Clamp
            if (isNaN(state.mess)) state.mess = 50; 

            const rechargeMult = getRechargeMultiplier(state.mess);

            // --- 2. Type 1 (Orderly) ---
            if (state.t1Active) {
                // Shift is 8:00 to 10:00
                const isShiftTime = (hourFloat >= CONFIG.t1StartHour && hourFloat < CONFIG.t1EndHour);
                
                if (state.t1Burnout) {
                    state.t1IsWorking = false;
                    state.t1Energy += CONFIG.t1BaseRecharge * rechargeMult;
                    if (state.t1Energy > 30) state.t1Burnout = false;
                } else if (isShiftTime && state.t1Energy > 0) {
                    state.t1IsWorking = true;
                    // Panic creates a smooth curve of effort
                    let effort = 1.0;
                    if (state.mess > 50) effort = 1.0 + ((state.mess - 50) / 100); // Max 1.5x
                    
                    state.mess -= (CONFIG.t1BaseWorkRate * effort);
                    state.t1Energy -= (CONFIG.t1EnergyCost * effort * state.energyCostMultiplier);

                    if (state.t1Energy <= 0) {
                        state.t1Energy = 0;
                        state.t1Burnout = true; 
                    }
                } else {
                    state.t1IsWorking = false;
                    state.t1Energy += CONFIG.t1BaseRecharge * rechargeMult;
                }
            } else {
                state.t1IsWorking = false;
            }
            if (state.t1Energy > 100) state.t1Energy = 100;

            // --- 3. Type 2 (Renewal) ---
            if (state.t2Active) {
                if (!state.t2IsWorking) {
                    if (state.mess > CONFIG.t2TriggerCrisis && state.t2Energy > 10) {
                        state.t2IsWorking = true;
                        state.t2Mode = 'crisis';
                    } else if (state.t2Energy >= CONFIG.t2TriggerInspired) {
                        state.t2IsWorking = true;
                        state.t2Mode = 'inspired';
                    }
                }

                if (state.t2IsWorking) {
                    state.mess -= CONFIG.t2BaseWorkRate;
                    state.t2Energy -= (CONFIG.t2EnergyCost * state.energyCostMultiplier);

                    if (state.mess <= CONFIG.t2StopThreshold) {
                        state.t2IsWorking = false;
                        state.t2Mode = 'dormant';
                    }
                    if (state.t2Energy <= 0) {
                        state.t2Energy = 0;
                        state.t2IsWorking = false;
                        state.t2Mode = 'dormant';
                    }
                } else {
                    state.t2Energy += CONFIG.t2BaseRecharge * rechargeMult;
                }
            } else {
                state.t2IsWorking = false;
            }
            if (state.t2Energy > 100) state.t2Energy = 100;

            if (state.mess < 0) state.mess = 0;

            return {
                mess: state.mess,
                t1Working: state.t1IsWorking,
                t2Working: state.t2IsWorking,
                t2Mode: state.t2Mode,
                hour: hourInt,
                minute: minute,
                dayIndex: dayIndex
            };
        }

        function updateUI() {
            const current = state.history[state.history.length - 1];
            if (!current) return;

            // Update Text Stats
            document.getElementById('mess-display').innerText = `Mess: ${Math.round(state.mess)}%`;
            document.getElementById('time-display').innerText = `Day ${current.dayIndex} ${current.hour.toString().padStart(2,0)}:${current.minute.toString().padStart(2,0)}`;

            // Update Status Text
            const t1Label = document.getElementById('status-t1');
            if (state.t1Burnout) t1Label.innerText = "BURNOUT (Recovering)";
            else if (state.t1IsWorking) t1Label.innerText = `WORKING (${Math.round(state.t1Energy)}% Energy)`;
            else t1Label.innerText = `Recharging (${Math.round(state.t1Energy)}%)`;

            const t2Label = document.getElementById('status-t2');
            if (state.t2IsWorking) t2Label.innerText = `${state.t2Mode === 'crisis' ? 'CRISIS MODE' : 'INSPIRED'} (${Math.round(state.t2Energy)}% Energy)`;
            else t2Label.innerText = `Dormant (${Math.round(state.t2Energy)}%)`;
        }

        function draw() {
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                state.maxHistory = window.innerWidth; 
            }

            // Clear White
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state.history.length < 2) return;

            const graphHeight = canvas.height * 0.6; 
            const graphBottom = canvas.height * 0.8; 
            const yScale = graphHeight / 100;

            let startIndex = 0;
            if (state.history.length > canvas.width) {
                startIndex = state.history.length - canvas.width;
            }

            // --- Draw Threshold (Subtle Grey Dashed) ---
            const thresholdY = graphBottom - (CONFIG.t2TriggerCrisis * yScale);
            ctx.beginPath();
            ctx.strokeStyle = "#e0e0e0";
            ctx.setLineDash([5, 5]);
            ctx.moveTo(0, thresholdY);
            ctx.lineTo(canvas.width, thresholdY);
            ctx.stroke();

            // --- Draw The Main Line (Black) ---
            ctx.setLineDash([]);
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "#000000";
            ctx.beginPath();
            
            for (let i = startIndex; i < state.history.length; i++) {
                const h = state.history[i];
                const x = i - startIndex;
                const y = graphBottom - (h.mess * yScale);
                if (i === startIndex) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.stroke();

            // --- Draw Worker Overlay (Colored Segments) ---
            // To make it minimalist, we draw over the black line with color only where working
            for (let i = startIndex; i < state.history.length; i++) {
                const h = state.history[i];
                const x = i - startIndex;
                const y = graphBottom - (h.mess * yScale);

                if (h.t1Working) {
                    ctx.fillStyle = "#0000cc"; // Deep Blue
                    ctx.fillRect(x, y - 2, 2, 4); // Small thick mark
                }
                if (h.t2Working) {
                    ctx.fillStyle = "#cc4400"; // Deep Orange
                    ctx.fillRect(x, y - 3, 2, 6); // Slightly larger mark
                }
            }
        }

        function loop() {
            state.history.push(simulationStep());
            if (state.history.length > 5000) state.history.shift();
            updateUI();
            draw();
            requestAnimationFrame(loop);
        }

        function warmUp() {
            for(let i=0; i<1500; i++) state.history.push(simulationStep());
        }

        function resetSim() {
            state.mess = 10;
            state.history = [];
            state.t1Energy = 80;
            state.t2Energy = 50;
            warmUp();
        }

        // Init Events
        document.getElementById('toggle-t1').addEventListener('change', e => state.t1Active = e.target.checked);
        document.getElementById('toggle-t2').addEventListener('change', e => state.t2Active = e.target.checked);
        document.getElementById('btn-chaos').addEventListener('click', () => state.mess += 20);
        document.getElementById('btn-reset').addEventListener('click', resetSim);
        document.getElementById('cost-slider').addEventListener('input', e => {
            state.energyCostMultiplier = parseFloat(e.target.value);
            document.getElementById('cost-val').innerText = state.energyCostMultiplier.toFixed(1) + "x";
        });

        // Run
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        warmUp();
        loop();

    </script>
</body>
</html>
